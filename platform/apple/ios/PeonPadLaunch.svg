<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1024" height="1024" viewBox="0 0 1024 1024">
  <title>PeonPad launch mark</title>
  <desc>The original PeonPad orc icon centered on a dark amber launch background.</desc>
  <defs>
    <radialGradient id="background" cx="50%" cy="50%" r="70%">
      <stop offset="0" stop-color="#70300d"/>
      <stop offset="1" stop-color="#15100b"/>
    </radialGradient>
    <clipPath id="icon-mask">
      <rect x="232" y="232" width="560" height="560" rx="112"/>
    </clipPath>
  </defs>
  <rect width="1024" height="1024" fill="url(#background)"/>
  <image x="232" y="232" width="560" height="560"
         clip-path="url(#icon-mask)"
         xlink:href="PeonPadAssets.xcassets/AppIcon.appiconset/PeonPadIcon.png"/>
</svg>
